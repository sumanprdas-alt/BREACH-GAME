// AUDIO
// ═══════════════════════════════════════════════════════════════
class SFX {
  constructor(){
    try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ this.ctx=null; }
    this.master = this.ctx ? this.ctx.createGain() : null;
    if(this.master){ this.master.gain.value=0.35; this.master.connect(this.ctx.destination); }
    this.bgmPlaying=false; this.bgmTimer=null;
  }
  resume(){ if(this.ctx?.state==='suspended') this.ctx.resume(); }
  // Core primitives — Hollywood v3
  t(f,d,type='square',v=0.3){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
    o.connect(g); g.connect(this.master); o.start(); o.stop(now+d);
  }
  sweep(f1,f2,d,type='square',v=0.3){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(f1,now); o.frequency.exponentialRampToValueAtTime(Math.max(f2,1),now+d);
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
    o.connect(g); g.connect(this.master); o.start(); o.stop(now+d);
  }
  n(d,v=0.2){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*d,this.ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource(),g=this.ctx.createGain();
    src.buffer=buf; g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
    src.connect(g); g.connect(this.master); src.start(); src.stop(now+d);
  }
  nf(d,freq,v=0.2){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*d,this.ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();
    src.buffer=buf; f.type='lowpass'; f.frequency.value=freq;
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
    src.connect(f); f.connect(g); g.connect(this.master); src.start(); src.stop(now+d);
  }
  kick(v=0.15){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(20,now+0.1);
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    o.connect(g); g.connect(this.master); o.start(); o.stop(now+0.12);
  }
  dist(f,d,v=0.3){
    if(!this.ctx) return; const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain(),ws=this.ctx.createWaveShaper();
    o.type='sawtooth'; o.frequency.value=f;
    const curve=new Float32Array(256); for(let i=0;i<256;i++){const x=i*2/255-1;curve[i]=Math.max(-0.5,Math.min(0.5,x*3))}
    ws.curve=curve; ws.oversample='4x';
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
    o.connect(ws); ws.connect(g); g.connect(this.master); o.start(); o.stop(now+d);
  }
  d(fn,ms){ setTimeout(fn,ms); }
  // Hollywood v3 SFX — multi-layered
  shoot(){ this.n(0.02,0.35); this.sweep(2000,300,0.07,'sawtooth',0.2); this.kick(0.1); this.nf(0.05,1500,0.1); }
  jump(){ this.sweep(150,400,0.07,'square',0.12); }
  hit(){ this.kick(0.25); this.n(0.12,0.3); this.sweep(400,40,0.2,'sawtooth',0.2); this.d(()=>this.dist(80,0.15,0.08),50); }
  enemyDie(){ this.n(0.04,0.3); this.kick(0.18); this.sweep(600,40,0.15,'sawtooth',0.2); this.d(()=>{this.nf(0.2,400,0.1);this.kick(0.06)},60); }
  explosion(){ this.kick(0.3); this.n(0.1,0.4); this.nf(0.6,500,0.35); this.sweep(150,15,0.5,'sawtooth',0.25); this.d(()=>{this.nf(0.4,300,0.12);this.kick(0.08)},80); this.d(()=>this.nf(0.3,200,0.06),200); }
  pickup(){ this.sweep(300,1500,0.1,'square',0.18); this.d(()=>{this.t(1500,0.08,'square',0.12);this.t(2000,0.06,'triangle',0.06)},100); this.d(()=>this.t(1500,0.05,'triangle',0.04),160); }
  death(){ [400,300,220,150,80].forEach((f,i)=>this.d(()=>this.t(f,0.1,'square',0.18),i*90)); }
  stageClear(){ [523,659,784,1047].forEach((f,i)=>this.d(()=>this.t(f,0.3,'square',0.15),i*150)); }
  turretPop(){ this.sweep(80,200,0.15,'sawtooth',0.1); this.nf(0.1,400,0.06); }
  spreadShot(){ this.n(0.08,0.4); this.nf(0.12,500,0.25); this.kick(0.2); this.sweep(100,30,0.15,'sawtooth',0.12); this.d(()=>this.nf(0.1,300,0.06),50); }

function drawBillFrame(frameIdx, x, y, flipX, tint){
  const cols=14, cw=66, ch=68, CHAR_SCALE=1.3;
  const dw=cw*CHAR_SCALE, dh=ch*CHAR_SCALE;
  const sc = frameIdx % cols, sr = Math.floor(frameIdx / cols);
  const sx=sc*cw, sy=sr*ch;
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if(flipX){ ctx.scale(-1,1); }
  if(tint){ctx.globalAlpha=0.5;ctx.fillStyle=tint;ctx.fillRect(-dw/2,-dh/2,dw,dh);ctx.globalAlpha=1;}
  ctx.drawImage(imgs.bill, sx, sy, cw, ch, -dw/2, -dh/2, dw, dh);
  ctx.restore();
}

function drawTile(img, sx, sy, sw, sh, dx, dy){
  ctx.drawImage(img, sx, sy, sw, sh, Math.round(dx), Math.round(dy), sw, sh);
}

        fixed:true,lastShot:gameTime,w:20,h:20,revealed:true,baseY:ob.y,orbTime:0});
    });
    // Crawlers spawned via trigger zones (not pre-placed)
    s2CrawlerTriggered = S2_CRAWLER_SPAWNS.map(()=>false);
    blackoutTriggered = false; blackoutStart = 0;
  }
}

function spawnFixedEnemy(x, type, platformY){
  const e = { x, y:GROUND_Y, vx:0, vy:0, hp:1, type, alive:true, fixed:true, lastShot:gameTime,
              w:36, h:36, revealed:false, popTime:0 };
  if(type==='tank'){ e.hp=3; e.w=80; e.h=56; e.y=GROUND_Y-56; e.revealed=true; }
  else if(type==='turret'){
    e.w=35; e.h=32;
    if(platformY){
      // Turret sits on a platform — already visible, no pop-up needed
      e.y = platformY - e.h;
      e.targetY = e.y;
      e.revealed = true;
      e.onPlatform = true;
    } else {
      // Ground turret — pops up when player approaches
      e.y = GROUND_Y;
      e.targetY = GROUND_Y - e.h;
    }
    e.hp = 2;
  }
  else {
    e.y = GROUND_Y;
    e.targetY = GROUND_Y - e.h;
    e.hp = 2;
  }
  enemies.push(e);
}

function getGroundY(x){
  // Bridge gap: no ground
  if(x >= BRIDGE_X && x < BRIDGE_X+BRIDGE_W){
    // Check if any planks still alive at this x
    const plank = bridgePlanks.find(p => p.alive && x >= p.x && x < p.x+p.w);
    if(plank) return plank.y;
    // Water floor (lower)
    return GROUND_Y + 28;
  }
  return GROUND_Y;
}

function isInWater(x, y){
  return x >= BRIDGE_X-10 && x < BRIDGE_X+BRIDGE_W+10 && y > GROUND_Y+5;
}

function resolveCollisionY(obj){
  obj.onPlatform = false; // reset each frame
  // Check ground
  const groundY = getGroundY(obj.x + obj.w/2);
  const feetY = obj.y + obj.h;

  if(obj.vy >= 0 && feetY >= groundY){
    obj.y = groundY - obj.h;
    obj.vy = 0;
    obj.grounded = true;
    return;
  }

  // Check platforms (only when falling, and allow drop-through with DOWN key)
  if(obj.vy >= 0 && !obj.dropThrough){
    const pList=currentStage===2?S2_PLATS:platforms;
    for(const p of pList){
      if(obj.x + obj.w > p.x && obj.x < p.x + p.w){
        if(feetY >= p.y && feetY - obj.vy <= p.y + 4){
          obj.y = p.y - obj.h;
          obj.vy = 0;
          obj.grounded = true;
          obj.onPlatform = true;
          return;
        }
      }
    }
  }

  obj.grounded = false;
}

// BILL UPDATE
// ═══════════════════════════════════════════════════════════════
function updateBill(dt){
  const b = bill;
  if(b.isDying) return;

  const now = gameTime;

  // Water detection
  b.inWater = isInWater(b.x + b.w/2, b.y + b.h);

  // Drop through platform: pressing DOWN+UP while on platform
  b.dropThrough = false;
  if(b.onPlatform && kp('ArrowDown') && justPressed('ArrowUp') && !b.inWater){
    b.dropThrough = true;
    b.onPlatform = false;
    b.grounded = false;
    b.y += 2;
  }

  // Prone — on any ground surface
  b.isProne = b.grounded && kp('ArrowDown') && !kp('ArrowUp') && !b.inWater;

  // Movement
  b.vx = 0;
  if(!b.isProne){
    if(kp('ArrowLeft')){ b.vx = -BILL_SPEED; b.facing = -1; }
    if(kp('ArrowRight')){ b.vx = BILL_SPEED; b.facing = 1; }
  }

  // Aim — UP aims up (works while grounded or airborne)
  if(b.isProne){ b.aimX=b.facing; b.aimY=0; }
  else if(kp('ArrowUp') && (kp('ArrowLeft')||kp('ArrowRight'))){ b.aimX=b.facing*0.707; b.aimY=-0.707; }
  else if(kp('ArrowUp')){ b.aimX=0; b.aimY=-1; }
  else if(!b.grounded && kp('ArrowDown')){ b.aimX=b.facing*0.707; b.aimY=0.707; }
  else { b.aimX=b.facing; b.aimY=0; }

  // Jump — UP key (only triggers on first press, not while held for aiming)
  if(justPressed('ArrowUp')) b.jumpBufferedAt = now;
  const canCoyote = (now - b.lastGroundedAt) <= COYOTE_MS;
  const jumpQueued = (now - b.jumpBufferedAt) <= JUMP_BUFFER_MS;
  if(jumpQueued && canCoyote && !b.isProne){
    b.vy = JUMP_POWER;
    b.jumpBufferedAt = -99999; b.lastGroundedAt = -99999;
    b.airStart = gameTime;
    sfx.jump();
  }
  // Variable jump height — release UP to cut jump short
  if(!kp('ArrowUp') && b.vy < -2) b.vy *= 0.8;

  // Gravity
  b.vy += GRAVITY;
  if(currentStage===2&&b.y<CEIL_Y+10){b.y=CEIL_Y+10;if(b.vy<0)b.vy=0;}
  if(b.vy > MAX_FALL) b.vy = MAX_FALL;

  // Move
  b.x += b.vx;
  b.y += b.vy;

  // Clamp to level bounds — but allow passing right edge after fortress opens
  if(currentStage===2){S2_CONVEYORS.forEach(cv=>{if(b.x+b.w>cv.x&&b.x<cv.x+cv.w&&b.grounded)b.x+=cv.dir*0.6;});}
  if(b.x < 0) b.x = 0;
  if(!fortressOpen && b.x > LEVEL_W - b.w) b.x = LEVEL_W - b.w;
  if(fortressOpen && b.x > LEVEL_W + 100){
    // Player walked off the right edge — trigger stage clear
    sfx.stageClear();
    scene='stageclear';
  }

  // Ground collision
  resolveCollisionY(b);
  if(b.grounded) b.lastGroundedAt = now;

  // Laser gate damage (Stage 2)
  if(currentStage===2&&!b.isDying&&gameTime>b.invulnUntil){
    const lBonus = DIFFICULTY[diffKey].laserOffBonus;
    S2_LASERS.forEach(lg=>{const cy=(gameTime%(lg.on+lg.off+lBonus));if(cy<lg.on&&Math.abs(b.x+b.w/2-lg.x)<6)damageBill();});
    // Steam vent damage — hurt during burst phase (after 500ms telegraph)
    const stBonus = DIFFICULTY[diffKey].steamCycleBonus;
    S2_STEAM_VENTS.forEach(sv=>{
      const phase=(gameTime%(sv.cycle+stBonus));
      const telegraphEnd=500, burstEnd=1500;
      if(phase>=telegraphEnd&&phase<burstEnd&&Math.abs(b.x+b.w/2-sv.x)<14){
        damageBill();
      }
    });
  }
  // Blackout event — triggered once at x=3200
  if(currentStage===2&&!blackoutTriggered&&b.x>=3150&&b.x<=3250){
    blackoutTriggered=true;
    blackoutStart=gameTime;
    sfx.blackoutAlarm();
    screenShake=800;
    // Spawn crawlers during blackout — count scales with difficulty
    const boCrawlers = DIFFICULTY[diffKey].blackoutCrawlers;
    for(let bc=0;bc<boCrawlers;bc++){
      const bx=b.x+100+Math.random()*200;
      enemies.push({x:bx,y:CEIL_Y+10,vx:0,vy:1+Math.random()*2,w:20,h:16,
        hp:1,type:'crawler',alive:true,fixed:false,lastShot:gameTime});
    }
  }
  // Fortress wall — impassable until boss defeated
  if(!fortressOpen && b.x + b.w > FORTRESS_X){
    b.x = FORTRESS_X - b.w;
  }

  // Shooting — SPACE key (also X as alternative)
  if(kp('Space') || kp('KeyX')){
    const rate = b.weapon==='R'?80:b.weapon==='M'?90:b.weapon==='S'?180:160;
    if(now - b.lastShotAt >= rate){
      fireBullet(); b.lastShotAt = now;
    }
  }

  // Grenade
  if(justPressed('KeyC') && b.grenadeStock > 0){
    b.grenadeStock--;
    bullets.push({
      x:b.x+b.w/2, y:b.y, vx:b.facing*3.5, vy:-4.5,
      isGrenade:true, explodeAt:now+1200, w:6, h:6
    });
    sfx.t(440,0.05,'square',0.1); sfx.n(0.03,0.06);
  }

  // Frame selection
  if(b.inWater){
    if(b.aimY < -0.5 && Math.abs(b.aimX) > 0.3) b.frame = BILL_FRAMES.waterDiagUp;
    else if(b.aimY < -0.5) b.frame = BILL_FRAMES.waterUp;
    else if(b.aimY > 0.5) b.frame = BILL_FRAMES.waterDiagDn;
    else b.frame = BILL_FRAMES.waterFwd;
  } else if(b.isProne){
    b.frame = BILL_FRAMES.prone;
  } else if(!b.grounded){
    // Somersault: cycle through frames 28,29,30 during air time
    const airTime = gameTime - b.airStart;
    const flipFrames = [28,29,30];
    const flipIdx = Math.floor(airTime / 80) % flipFrames.length;
    b.frame = flipFrames[flipIdx];
  } else if(b.vx !== 0){
    b.runTimer += dt;
    if(b.runTimer > 100){ b.runTimer=0; b.runToggle=!b.runToggle; }
    b.frame = b.runToggle ? BILL_FRAMES.run1 : BILL_FRAMES.run2;
  } else if(kp('ArrowUp')){
    b.frame = BILL_FRAMES.aimUp;
  } else {
    b.frame = BILL_FRAMES.idle;
  }
}

// BULLETS
// ═══════════════════════════════════════════════════════════════
function fireBullet(){
  const b = bill;
  let ox = b.x + b.w/2 + b.facing*10, oy = b.y + 15;
  if(b.isProne){ oy = b.y + b.h - 5; }
  else if(b.aimY < -0.5){ oy = b.y; ox = b.x + b.w/2; }

  if(b.weapon === 'S'){
    const base = Math.atan2(b.aimY, b.aimX);
    [-0.4,-0.2,0,0.2,0.4].forEach(a => {
      const ang = base+a;
      bullets.push({ x:ox, y:oy, vx:Math.cos(ang)*BULLET_SPEED, vy:Math.sin(ang)*BULLET_SPEED,
                     w:5, h:5, isGrenade:false, dmg:1 });
    });
  } else {
    let vx=b.aimX*BULLET_SPEED, vy=b.aimY*BULLET_SPEED;
    let dmg=1;
    if(b.weapon==='R'){ vx+=(Math.random()-0.5)*1.5; vy+=(Math.random()-0.5)*1.5; }
    if(b.weapon==='F'){ vx*=0.6; vy*=0.6; dmg=2; }
    bullets.push({ x:ox, y:oy, vx, vy, w:7, h:3, isGrenade:false, dmg });
  }
  // Weapon-specific Hollywood v3 sounds
  if(b.weapon === 'S') sfx.spreadShot();
  else if(b.weapon === 'M') sfx.machineGun();
  else if(b.weapon === 'F') sfx.fireball();
  else sfx.shoot();
}

function updateBullets(){
  // Player bullets
  for(let i=bullets.length-1; i>=0; i--){
    const bl = bullets[i];
    if(bl.isGrenade){
      bl.vy += GRAVITY * 0.8;
      bl.x += bl.vx; bl.y += bl.vy;
      // Bounce off ground
      const gy = getGroundY(bl.x);
      if(bl.y + bl.h >= gy){ bl.y = gy - bl.h; bl.vy *= -0.3; }
      if(gameTime > bl.explodeAt){
        explodeGrenade(bl); bullets.splice(i,1); continue;
      }
    } else {
      bl.x += bl.vx; bl.y += bl.vy;
    }
    // OOB
    if(bl.x < camera.x-50 || bl.x > camera.x+GW+50 || bl.y < -50 || bl.y > GH+50){
      bullets.splice(i,1); continue;
    }
    // Hit enemies
    if(!bl.isGrenade){
      for(const e of enemies){
        if(!e.alive) continue;
        if(boxOverlap(bl, {x:e.x, y:e.y, w:e.w, h:e.h})){
          e.hp -= (bl.dmg||1);
          if(e.hp <= 0) killEnemy(e);
          else { /* flash */ }
          bullets.splice(i,1); sfx.hit(); break;
        }
      }
    }
    // Hit crates
    if(!bl.isGrenade){
      for(const c of crates){
        if(!c.alive) continue;
        if(boxOverlap(bl, c)){
          c.alive = false;
          spawnPickup(c);
          bullets.splice(i,1); sfx.explosion();
          spawnExplosion(c.x+c.w/2, c.y+c.h/2);
          break;
        }
      }
    }
    // Hit boss
    if(bossActive && !bl.isGrenade){
      for(const cn of cannons){
        if(!cn.alive) continue;
        if(boxOverlap(bl, {x:cn.x-14, y:cn.y-8, w:28, h:16})){
          cn.hp--; if(cn.hp<=0){ cn.alive=false; spawnExplosion(cn.x,cn.y); sfx.explosion();
            if(cannons.every(c=>!c.alive)&&!coreExposed){ coreExposed=true; }
          }
          bullets.splice(i,1); sfx.hit(); break;
        }
      }
      if(coreExposed && boxOverlap(bl, {x:FORTRESS_X+25,y:GROUND_Y-140,w:40,h:60})){
        coreHp--; bullets.splice(i,1); sfx.hit();
        if(coreHp<=0){ bossDefeated=true; victorySequence(); }
      }
    }
  }

  // Enemy bullets
  for(let i=enemyBullets.length-1;i>=0;i--){
    const bl=enemyBullets[i];
    bl.x+=bl.vx; bl.y+=bl.vy;
    if(bl.x<camera.x-50||bl.x>camera.x+GW+50||bl.y<-50||bl.y>GH+50){
      enemyBullets.splice(i,1); continue;
    }
    // Hit bill — use smaller hitbox when prone so bullets pass over
    if(!bill.isDying && gameTime > bill.invulnUntil){
      const bh = bill.isProne ? { x:bill.x-10, y:bill.y+28, w:34, h:12 } : { x:bill.x, y:bill.y, w:bill.w, h:bill.h };
      if(boxOverlap(bl, bh)){
        enemyBullets.splice(i,1); damageBill(); break;
      }
    }
  }
}

function explodeGrenade(g){
  spawnExplosion(g.x, g.y); sfx.explosion();
  const r=60;
  enemies.forEach(e => {
    if(!e.alive) return;
    const dx=e.x+e.w/2-g.x, dy=e.y+e.h/2-g.y;
    if(Math.sqrt(dx*dx+dy*dy) < r){ e.hp-=3; if(e.hp<=0) killEnemy(e); }
  });
}

// ═══════════════════════════════════════════════════════════════
// ENEMIES
// ═══════════════════════════════════════════════════════════════
function spawnWaveEnemy(){
  const mobileCount = enemies.filter(e => e.alive && !e.fixed).length;
  if(mobileCount >= 3) return;
  if(bill.isDying || bill.x < 400) return;
  if(currentStage===1 && bossActive && bill.x > FORTRESS_X - 300) return;
  if(gameTime - lastWaveTime < WAVE_INTERVAL) return;

  // Spawn from ahead OR behind (Stage 2: corridor, enemies come from both sides)
  let x = camera.x + GW + 30;
  if(currentStage===2 && Math.random() < 0.1) x = camera.x - 40; // occasional from behind

  const zoneList = currentStage===2 ? S2_ZONES : ZONES;
  const zone = zoneList.find(z => bill.x >= z.start && bill.x < z.end) || zoneList[zoneList.length-1];
  const r = Math.random();
  let etype = 'soldier', espeed = ENEMY_SPEED, ehp = 1;

  if(currentStage===2){
    // Stage 2: more variety, chargers from behind, snipers rare
    if(zone.name==='tunnel'){
      etype = r < 0.5 ? 'soldier' : r < 0.85 ? 'charger' : 'sniper';
    } else if(zone.name==='lab'){
      etype = r < 0.35 ? 'soldier' : r < 0.7 ? 'charger' : 'sniper';
    } else {
      etype = r < 0.3 ? 'soldier' : r < 0.65 ? 'charger' : 'sniper';
    }
  } else {
    // Stage 1: original behavior
    if(zone.name === 'jungle'){
      etype = r < 0.7 ? 'soldier' : 'sniper';
    } else if(zone.name === 'riverbank'){
      etype = r < 0.5 ? 'soldier' : r < 0.8 ? 'sniper' : 'charger';
    } else {
      etype = r < 0.4 ? 'soldier' : r < 0.7 ? 'charger' : 'sniper';
    }
  }
  if(etype === 'charger') espeed = ENEMY_SPEED * 2.2;
  mobileEnemy = {
    x, y:GROUND_Y-40, vx:0, vy:0, w:36, h:40,
    hp:ehp, type:etype, alive:true, fixed:false, lastShot:gameTime, espeed
  };
  enemies.push(mobileEnemy);
  lastWaveTime = gameTime;
}

// Stage 2: spawn crawlers when player enters trigger zone
function checkCrawlerSpawns(){
  if(currentStage!==2) return;
  const diff = DIFFICULTY[diffKey];
  S2_CRAWLER_SPAWNS.forEach((cs,idx)=>{
    if(s2CrawlerTriggered[idx]) return;
    if(Math.abs(bill.x - cs.x) < 150){
      s2CrawlerTriggered[idx] = true;
      const count = Math.max(2, Math.round(cs.count * diff.enemyDensity));
      for(let c=0; c<count; c++){
        const cx2 = cs.x + (Math.random()-0.5)*100;
        enemies.push({
          x:cx2, y:CEIL_Y+10, vx:0, vy:1+Math.random()*2, w:20, h:16,
          hp:1, type:'crawler', alive:true, fixed:false, lastShot:gameTime
        });
      }
    }
  });
}

function updateEnemies(){
  const diff = DIFFICULTY[diffKey];
  for(let i=enemies.length-1; i>=0; i--){
    const e = enemies[i];
    if(!e.alive){ enemies.splice(i,1); continue; }

    // Remove far-away mobile enemies
    if(!e.fixed && (e.x < camera.x-300 || e.x > camera.x+GW+400)){
      e.alive=false; enemies.splice(i,1);
      if(mobileEnemy===e) mobileEnemy=null;
      continue;
    }

    const dx = bill.x - e.x, dist = Math.abs(dx);

    // Mobile enemies: soldier, charger, sniper
    if(e.type==='soldier' || e.type==='charger' || e.type==='sniper'){
      // Movement (snipers are stationary)
      if(e.type !== 'sniper' && dist < 500){
        const spd = e.type==='charger' ? ENEMY_SPEED*2.5 : ENEMY_SPEED;
        e.vx = (dx>0?1:-1) * spd * diff.speedMul;
      } else if(e.type === 'sniper'){
        e.vx = 0;
      }
      // Gravity & position
      e.vy += GRAVITY; if(e.vy>MAX_FALL) e.vy=MAX_FALL;
      e.x += e.vx; e.y += e.vy;
      const gy = getGroundY(e.x+e.w/2);
      if(e.y+e.h >= gy){ e.y=gy-e.h; e.vy=0; }
      // Shooting — only when enemy is visible on screen
      const onScreen = e.x > camera.x - 20 && e.x < camera.x + GW + 20;
      const shotInterval = e.type==='sniper' ? diff.shotMs*0.5 : diff.shotMs;
      if(onScreen && dist < 400 && gameTime-e.lastShot > shotInterval){
        e.lastShot = gameTime;
        const ang = Math.atan2(bill.y+20-e.y-16, bill.x+7-e.x-11);
        enemyBullets.push({
          x:e.x+11, y:e.y+10,
          vx:Math.cos(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,
          vy:Math.sin(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,
          w:5, h:4
        });
      }
    }
    // Turrets (pop up when close)
    else if(e.type==='turret'){
      // Pop up from hidden when player approaches
      if(!e.revealed && dist < 200){
        e.revealed = true;
        e.popTime = gameTime;
        sfx.turretPop();
      }
      // Rise from ground to targetY over 500ms
      if(e.revealed && e.y > e.targetY){
        const rise = e.h / 30; // rise full height in ~30 frames (500ms)
        e.y = Math.max(e.targetY, e.y - rise);
      }
      // Only shoot once fully popped up AND visible on screen
      const turretOnScreen = e.x > camera.x - 20 && e.x < camera.x + GW + 20;
      if(turretOnScreen && e.revealed && e.y <= e.targetY + 2 && dist < 350 && gameTime-e.lastShot > diff.shotMs*1.2){
        e.lastShot=gameTime;
        const ang=Math.atan2(bill.y+20-(e.y+e.h/2), bill.x+7-(e.x+e.w/2));
        enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h/3,vx:Math.cos(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,
          vy:Math.sin(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,w:5,h:4});
      }
    }
    // Ceiling turrets (Stage 2)
    else if(e.type==='ceilturret'){
      const ctOnScreen=e.x>camera.x-20&&e.x<camera.x+GW+20;
      if(ctOnScreen&&dist<350&&gameTime-e.lastShot>diff.shotMs*1.3){
        e.lastShot=gameTime;
        const ang=Math.atan2(bill.y+20-(e.y+e.h),bill.x+7-(e.x+e.w/2));
        enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h,vx:Math.cos(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,
          vy:Math.sin(ang)*ENEMY_BULLET_SPEED*diff.bulletMul,w:5,h:4});
      }
    }
    // Energy orbs (Stage 2) — sine wave float
    else if(e.type==='orb'){
      e.orbTime += 0.03;
      e.y = e.baseY + Math.sin(e.orbTime) * 25;
    }
    // Crawlers (Stage 2) — fast ground scuttlers
    else if(e.type==='crawler'){
      // Brief pause after spawning before chasing
      if(!e.spawnTime) e.spawnTime = gameTime;
      const crawlAge = gameTime - e.spawnTime;
      if(crawlAge < 600){
        // Falling/landing phase — just drop, don't chase yet
        e.vy += GRAVITY; if(e.vy > MAX_FALL) e.vy = MAX_FALL;
        e.y += e.vy;
        const cgy = getGroundY(e.x + e.w/2);
        if(e.y + e.h >= cgy){ e.y = cgy - e.h; e.vy = 0; }
      } else {
        // Chase phase — speed scales with difficulty
        const cdx = bill.x - e.x;
        e.vx = (cdx > 0 ? 1 : -1) * diff.crawlerSpeed;
        e.x += e.vx;
        e.vy += GRAVITY; if(e.vy > MAX_FALL) e.vy = MAX_FALL;
        e.y += e.vy;
        const cgy = getGroundY(e.x + e.w/2);
        if(e.y + e.h >= cgy){ e.y = cgy - e.h; e.vy = 0; }
      }
    }
    // Tanks
    else if(e.type==='tank'){
      const tankOnScreen = e.x > camera.x - 20 && e.x < camera.x + GW + 20;
      if(tankOnScreen && dist < 400 && gameTime-e.lastShot > 2000){
        e.lastShot=gameTime;
        const ang=Math.atan2(bill.y+20-e.y-14,bill.x+7-e.x-20);
        enemyBullets.push({x:e.x+20,y:e.y+8,vx:Math.cos(ang)*3*diff.bulletMul,
          vy:Math.sin(ang)*3*diff.bulletMul,w:8,h:8});
      }
    }

    // Touch damage — ALL enemies including fixed turrets
    if(!bill.isDying && gameTime > bill.invulnUntil){
      const isVisible = e.fixed ? (e.revealed && e.y <= (e.targetY||e.y) + 4) : true;
      if(isVisible){
        const bh = bill.isProne ? { x:bill.x-10, y:bill.y+28, w:34, h:12 } : { x:bill.x, y:bill.y, w:bill.w, h:bill.h };
        if(boxOverlap(bh, {x:e.x,y:e.y,w:e.w,h:e.h})){
          damageBill();
        }
      }
    }

    // Solid collision — player can't walk through alive enemies/turrets
    if(e.alive && !bill.isDying){
      const isVisible = e.fixed ? (e.revealed && e.y <= (e.targetY||e.y) + 4) : true;
      if(isVisible){
        const ex = e.x, ey = e.y, ew = e.w, eh = e.h;
        const bx = bill.x, by = bill.y, bw = bill.w, bh2 = bill.h;
        if(by + bh2 > ey + 4 && by < ey + eh){
          if(bx + bw > ex + 2 && bx + bw < ex + ew/2 + 2){
            bill.x = ex - bw;
          }
          if(bx < ex + ew - 2 && bx > ex + ew/2 - 2){
            bill.x = ex + ew;
          }
        }
      }
    }
  }
}

function killEnemy(e){
  e.alive = false;
  spawnExplosion(e.x+e.w/2, e.y+e.h/2);
  sfx.enemyDie();
  bill.kills++;
  // Differentiated scoring
  if(e.type==='crawler') score += 50;
  else if(e.type==='orb') score += 150;
  else if(e.type==='ceilturret') score += 150;
  else score += 100;
  if(mobileEnemy===e) mobileEnemy=null;
  // Orb shrapnel: 4 bullets in cardinal directions on death
  if(e.type==='orb'){
    const spd=2.5;
    [{vx:spd,vy:0},{vx:-spd,vy:0},{vx:0,vy:spd},{vx:0,vy:-spd}].forEach(d=>{
      enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:d.vx,vy:d.vy,w:4,h:4});
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// DAMAGE / DEATH / RESPAWN
// ═══════════════════════════════════════════════════════════════
function damageBill(){
  const diff = DIFFICULTY[diffKey];
  if(bill.isDying || gameTime < bill.invulnUntil) return;
  bill.hp--; bill.weapon='default'; sfx.hit();
  if(bill.hp <= 0) killBill();
  else { bill.invulnUntil = gameTime + diff.invuln; }
}

function killBill(){
  if(bill.isDying) return; // prevent double-death
  bill.isDying = true; sfx.death();
  bill.vy = -5;
  bill.vx = 0;
  // Use gameTime-based check instead of setTimeout to avoid stale callbacks
  bill.deathTime = gameTime;
}

// Called from update loop
function checkDeathTimer(){
  if(bill.isDying && bill.deathTime && gameTime - bill.deathTime > 1500){
    bill.deathTime = null;
    lives--;
    if(lives < 0){
      sfx.stopBGM();
      scene = 'gameover';
    } else {
      respawnBill();
    }
  }
}

function respawnBill(){
  const diff = DIFFICULTY[diffKey];
  bill.x = Math.min(camera.x + GW/2, FORTRESS_X - 30);
  bill.y = 0; bill.vy = 0; bill.vx = 0;
  bill.isDying = false; bill.hp = diff.hp;
  bill.weapon = 'default'; bill.grenadeStock = 3;
  bill.invulnUntil = gameTime + 2500;
  bill.isProne = false;
  bill.onPlatform = false;
  bill.dropThrough = false;
  // Clear ALL mobile enemies — they move on after killing you (like original Contra)
  for(let i = enemies.length-1; i >= 0; i--){
    const e = enemies[i];
    if(!e.fixed && e.alive){
      e.alive = false;
      enemies.splice(i, 1);
    }
  }
  mobileEnemy = null;
  // Clear all enemy bullets
  enemyBullets.length = 0;
  // Reset wave timer so next enemy doesn't spawn immediately
  lastWaveTime = gameTime;
}

// ═══════════════════════════════════════════════════════════════
// PICKUPS & EFFECTS
// ═══════════════════════════════════════════════════════════════
function spawnPickup(crate){
  if(crate.weapon==='1UP'){ lives++; sfx.pickup(); return; }
  if(crate.weapon==='G'){ bill.grenadeStock=Math.min(bill.grenadeStock+3,9); sfx.pickup(); return; }
  pickups.push({ x:crate.x, y:crate.y-10, vy:-2, w:16, h:12, weapon:crate.weapon, alive:true });
}

function updatePickups(){
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    p.vy+=GRAVITY*0.5; p.y+=p.vy;
    const gy=getGroundY(p.x+8);
    if(p.y+p.h>=gy){ p.y=gy-p.h; p.vy=0; }
    if(boxOverlap(p,{x:bill.x,y:bill.y,w:bill.w,h:bill.h})){
      bill.weapon=p.weapon; pickups.splice(i,1); sfx.pickup(); continue;
    }
    if(p.x < camera.x-200) pickups.splice(i,1);
  }
}

function spawnExplosion(x,y){
  explosions.push({ x, y, t:0, maxT:400 });
}

function updateExplosions(dt){
  for(let i=explosions.length-1;i>=0;i--){
    explosions[i].t += dt;
    if(explosions[i].t > explosions[i].maxT) explosions.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════════════
// BRIDGE / HELICOPTER SET PIECE
// ═══════════════════════════════════════════════════════════════
function checkBridge(){
  if(currentStage!==1) return;
  if(!bridgeTriggered && bill.x >= BRIDGE_X - 50){
    bridgeTriggered = true;
    chopperObj = { x: BRIDGE_X+BRIDGE_W+200, y:GROUND_Y-80, phase:'flyIn', t:0 };
  }
  if(chopperObj){
    chopperObj.t += 16;
    if(chopperObj.phase==='flyIn'){
      chopperObj.x -= 2;
      if(chopperObj.x <= BRIDGE_X+BRIDGE_W/2){
        chopperObj.phase = 'bomb'; chopperObj.t=0; chopperObj.plankIdx=0;
      }
    } else if(chopperObj.phase==='bomb'){
      if(chopperObj.t % 120 < 16 && chopperObj.plankIdx < bridgePlanks.length){
        bridgePlanks[chopperObj.plankIdx].alive = false;
        chopperObj.plankIdx++;
      }
      if(chopperObj.plankIdx >= bridgePlanks.length){
        chopperObj.phase='flyAway'; chopperObj.t=0;
      }
    } else if(chopperObj.phase==='flyAway'){
      chopperObj.x -= 3;
      if(chopperObj.x < camera.x - 100) chopperObj = null;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// BOSS
// ═══════════════════════════════════════════════════════════════
function checkBoss(){
  if(currentStage!==1) return;
  if(!bossActive && bill.x >= FORTRESS_X-300) bossActive = true;
  if(!bossActive || bossDefeated) return;
  const diff = DIFFICULTY[diffKey];
  cannons.forEach(c => {
    if(!c.alive) return;
    // Only shoot when cannon is visible on screen
    const cannonOnScreen = c.x > camera.x - 20 && c.x < camera.x + GW + 20;
    if(cannonOnScreen && gameTime - c.lastShot > diff.shotMs*1.2){
      c.lastShot = gameTime;
      const ang = Math.atan2(bill.y+20-c.y, bill.x+7-c.x);
      enemyBullets.push({x:c.x,y:c.y,vx:Math.cos(ang)*2.5*diff.bulletMul,
        vy:Math.sin(ang)*2.5*diff.bulletMul,w:6,h:6});
    }
  });
}

let victoryTimer = 0;
let fortressExploding = false;
let screenShake = 0;
function victorySequence(){
  sfx.stopBGM();
  fortressExploding = true;
  victoryTimer = gameTime;
  screenShake = 2500; // shake for 2.5 seconds
  // Spawn massive cascade of explosions across the wall
  for(let i=0; i<12; i++){
    const delay = i * 200 + Math.random()*150;
    setTimeout(()=>{
      if(fortressExploding){
        sfx.explosion();
        spawnExplosion(FORTRESS_X + 20 + Math.random()*60, GROUND_Y - 40 - Math.random()*200);
      }
    }, delay);
  }
}

// ═══════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════
function updateCamera(){
  const target = bill.x - GW/3;
  camera.x += (target - camera.x) * 0.08;
  if(camera.x < 0) camera.x = 0;
  const maxCam = fortressOpen ? LEVEL_W + 200 - GW : LEVEL_W - GW;
  if(camera.x > maxCam) camera.x = maxCam;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  ctx.save();
  ctx.scale(SCALE, SCALE);
  if(screenShake>0){const i=Math.min(6,screenShake/300);ctx.translate(Math.sin(gameTime*0.09)*i,Math.cos(gameTime*0.07)*i*0.6);}
  const cx=Math.round(camera.x);
  // Zone tint
  const zoneList=currentStage===2?S2_ZONES:ZONES;
  const zone=zoneList.find(z=>bill.x>=z.start&&bill.x<z.end)||zoneList[zoneList.length-1];
  let tintColor='rgba(0,30,10,0.12)';
  if(zone.name==='riverbank')tintColor='rgba(0,20,30,0.15)';
  if(zone.name==='fortress')tintColor='rgba(30,10,10,0.18)';
  // Stage 2 zone tints
  if(zone.name==='tunnel')tintColor='rgba(10,15,30,0.15)';
  if(zone.name==='lab')tintColor='rgba(25,10,25,0.16)';
  if(zone.name==='reactor')tintColor='rgba(35,15,5,0.18)';
  if(zone.name==='sentinel')tintColor='rgba(30,5,5,0.2)';
  // Background rendering per stage
  if(currentStage===2){
    // === STAGE 2: CORRIDOR ===
    // Zone-dependent palette
    let bgFill='#08060c',ceilFill='#1a1820',ceilEdge='#2a2830',floorFill='#1a1820',floorEdge='#2a2830',floorHL='#3a3840';
    let pipeFill='#252230',panelFill='#14121a',panelStroke='#1e1c24',stripeFill='#3a1515',stripeHL='#4a2020',grateFill='#16141c';
    if(zone.name==='lab'){bgFill='#0a060e';ceilFill='#1c1626';ceilEdge='#2c2438';pipeFill='#281e34';panelFill='#16101e';panelStroke='#201828';stripeFill='#2a1530';stripeHL='#3a2040';}
    else if(zone.name==='reactor'){bgFill='#0e0806';ceilFill='#221814';ceilEdge='#322418';pipeFill='#302010';panelFill='#1a1008';panelStroke='#261810';floorFill='#221814';floorEdge='#322418';floorHL='#443020';stripeFill='#3a1510';stripeHL='#4a2510';grateFill='#1c1208';}
    else if(zone.name==='sentinel'){bgFill='#0a0406';ceilFill='#1e0e12';ceilEdge='#2e1418';pipeFill='#281014';panelFill='#160a0e';panelStroke='#201014';floorFill='#1e0e12';floorEdge='#2e1418';floorHL='#3e1820';stripeFill='#3a0a10';stripeHL='#4a1018';grateFill='#180a0c';}
    ctx.fillStyle=bgFill;ctx.fillRect(0,0,GW,GH);
    // Ceiling
    ctx.fillStyle=ceilFill;ctx.fillRect(0,0,GW,CEIL_Y);
    ctx.fillStyle=ceilEdge;ctx.fillRect(0,CEIL_Y-2,GW,4);
    // Floor

function drawNESLogo(cx,cy,scale){
  const COLS=10,ROWS=12,PX=scale||3,GAP=1;
  const word='BREACH',totalW=word.length*(COLS+GAP)-GAP;
  const startX=cx-(totalW*PX)/2,startY=cy-(ROWS*PX)/2;
  let lx=0;
  for(const ch of word){
    const g=LOGO_GLYPHS[ch];
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(g[y][x]==='1'){ctx.fillStyle='#000';ctx.fillRect(startX+(lx+x+0.4)*PX,startY+(y+0.4)*PX,PX,PX);}
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(g[y][x]==='1'){ctx.fillStyle='#e8e2d4';ctx.fillRect(startX+(lx+x)*PX,startY+y*PX,PX,PX);}
    lx+=COLS+GAP;
  }
  ctx.fillStyle='#d94236';ctx.fillRect(startX-2*PX,startY+6*PX,(totalW+4)*PX,PX*2);
}

function renderStoryPrelude(){
  ctx.save();ctx.scale(SCALE,SCALE);ctx.fillStyle='#000408';ctx.fillRect(0,0,GW,GH);drawScanlines();
  ctx.fillStyle='#d94236';ctx.fillRect(10,6,GW-20,14);

  ctx.fillText('! CLASSIFIED \xb7 OPERATION BREACH !',GW/2,16);

  const elapsed=performance.now()-preludeStart;
  const scrollSpeed=0.028; // pixels per ms
  const lineH=11;
  const totalH=STORY_TEXT.length*lineH;
  const scrollY=elapsed*scrollSpeed; // starts at 0, increases over time

  // Text starts at bottom of screen and scrolls up
  ctx.fillStyle='#3cc048';ctx.font='5px "Press Start 2P",monospace';
  let anyVisible=false;
  for(let i=0;i<STORY_TEXT.length;i++){
    const ly=GH - 10 + i*lineH - scrollY; // starts below screen, scrolls up
    if(ly>22&&ly<GH-6){
      const fade=Math.min(1,(ly-22)/25,(GH-6-ly)/25);
      ctx.globalAlpha=Math.max(0.05,fade);
      ctx.fillText(STORY_TEXT[i],GW/2,ly);
      anyVisible=true;
    }
  }
  ctx.globalAlpha=1;

  // After all text scrolled off: blank moment, then auto-continue
  const scrollDone=scrollY > GH + totalH + 20;
  if(scrollDone){
    const blankTime=elapsed - (GH + totalH + 20)/scrollSpeed;
    if(blankTime > 2500){
      // Auto-advance to stage briefing
      titlePhase='stagebriefing';stageStart=performance.now();
    } else if(blankTime > 800){
      // Show prompt after a pause
      ctx.fillStyle='#fcfcfc';ctx.font='6px "Press Start 2P",monospace';
      if(Math.floor(gameTime/500)%2===0) ctx.fillText('ENTER TO CONTINUE',GW/2,GH/2+10);

    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='4px "Press Start 2P",monospace';
    ctx.fillText('ENTER TO SKIP',GW/2,GH-8);
  }

  ctx.textAlign='left';ctx.restore();
}

    case 'stagebriefing':renderStageBriefing();break;
  }

function updateTitle(){
  switch(titlePhase){
    case 'splash':
      if(justPressed('Enter')||justPressed('Space')){
        sfx.resume();
        if(!titleBgmStarted){sfx.startBGM();titleBgmStarted=true;}
        titlePhase='menu';
      }
      break;
    case 'menu':
      if(justPressed('ArrowUp'))menuSel=Math.max(0,menuSel-1);
      if(justPressed('ArrowDown'))menuSel=Math.min(2,menuSel+1);
      if(justPressed('Enter')){diffKey=['easy','normal','hard'][menuSel];titlePhase='charsel';}
      break;
    case 'charsel':
      if(justPressed('ArrowLeft'))charSel=Math.max(0,charSel-1);
      if(justPressed('ArrowRight'))charSel=Math.min(2,charSel+1);
      if(justPressed('Enter')){titlePhase='prelude';preludeStart=performance.now();}
      if(justPressed('Escape'))titlePhase='menu';break;
    case 'prelude':
      if(justPressed('Enter')||justPressed('Space')){titlePhase='stagebriefing';stageStart=performance.now();}break;
    case 'stagebriefing':
      if(justPressed('Enter')||justPressed('Space')){titlePhase='splash';scene='play';initGame();}break;
  }
}

// ═══════════════════════════════════════════════════════════════
let lastTime = 0;
function gameLoop(timestamp){
  const dt = Math.min(timestamp - lastTime, 33); // cap at ~30fps min
  lastTime = timestamp;
  gameTime += dt;

  switch(scene){
    case 'title': updateTitle(); renderTitle(); break;
    case 'play':
      if(justPressed('KeyH')) showHelp = !showHelp;
      if(showHelp){ render(); renderHelp(); break; }
      checkDeathTimer();
      updateBill(dt);
      updateBullets();
      spawnWaveEnemy();
      checkCrawlerSpawns();
      updateEnemies();
      updatePickups();
      updateExplosions(dt);
      checkBridge();
      checkBoss();
      updateCamera();
      // Open wall after explosions finish — player can walk through
      if(bossDefeated && gameTime - victoryTimer > 3000) fortressOpen = true;
      // Screen shake during fortress explosion
      if(screenShake > 0) screenShake = Math.max(0, screenShake - dt);
      render();
      break;
    case 'gameover': updateGameOver(); renderGameOver(); break;
    case 'stageclear': updateStageClear(); renderStageClear(); break;
  }

  requestAnimationFrame(gameLoop);
}

  ctx.fillStyle='#e6c84a';ctx.font='5px "Press Start 2P",monospace';
  ctx.fillText('PRESS H TO CLOSE',GW/2,GH-10);
  ctx.textAlign='left';ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════════════════
async function boot(){
  for(const [key, b64] of Object.entries(ASSETS_B64)){
    imgs[key] = await loadImg(b64);
  }
  document.getElementById('loading').style.display='none';
  createTextures();
  requestAnimationFrame(gameLoop);
}

boot();
</script>
